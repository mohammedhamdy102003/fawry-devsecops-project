services:
  db:
    image: mysql:8.0
    container_name: fawry-db
    restart: always
    environment:
      MYSQL_DATABASE: fawry_db
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fawry-network
  backend:
    build: ./Fawry
    container_name: fawry-backend
    image: fawry-backend:latest
    restart: always
    depends_on:
      - db
    env_file:
      - ./Fawry/.env
    environment:
      - DB_HOST=db
      - DB_CONNECTION=mysql
      - DB_PORT=3306
      - DB_DATABASE=fawry_db
      - DB_USERNAME=root
      - DB_PASSWORD=root_password
    networks:
      - fawry-network
  frontend:
    image: fawry-frontend:latest
    container_name: fawry-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fawry-network
volumes:
  db_data:
networks:
  fawry-network:
    driver: bridge
